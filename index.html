    4:{n:"Volume + Test 1",r:"Apr 20–23"},
    5:{n:"Expressions",r:"Apr 27–30"},
    6:{n:"Equations",r:"May 4–7"},
    7:{n:"Inequalities + Test 2",r:"May 11–14"},
    8:{n:"Real-World Equations + Final",r:"May 18–21"},
};

const Q = [
{q:"Genius is as common as dirt. We suppress genius because we haven't yet figured out how to manage a population of educated men and women.",a:"John Taylor Gatto"},
{q:"Whatever an education is, it should make you a unique individual, not a conformist.",a:"John Taylor Gatto"},
{q:"I've come to believe that genius is an exceedingly common human quality, probably natural to most of us.",a:"John Taylor Gatto"},
{q:"Teaching is not about information. It is about having an honest intellectual relationship with your students.",a:"John Taylor Gatto"},
{q:"Trust the children. Nothing could be more simple, or more difficult.",a:"John Holt"},
{q:"Learning is not the product of teaching. Learning is the product of the activity of learners.",a:"John Holt"},
{q:"We need not fear that children left to themselves will remain ignorant.",a:"John Holt"},
{q:"The prosperity of a country depends not on the abundance of its revenues, but on the number of its cultivated citizens.",a:"Martin Luther"},
{q:"Even if I knew that tomorrow the world would go to pieces, I would still plant my apple tree.",a:"Martin Luther"},
{q:"If you want to change the world, pick up your pen and write.",a:"Martin Luther"},
{q:"I have never let my schooling interfere with my education.",a:"Mark Twain"},
{q:"The only really educated men are self-educated.",a:"Mark Twain"},
{q:"The task of the modern educator is not to cut down jungles, but to irrigate deserts.",a:"C.S. Lewis"},
{q:"Education without values, as useful as it is, seems rather to make man a more clever devil.",a:"C.S. Lewis"},
{q:"Courage is not simply one of the virtues, but the form of every virtue at the testing point.",a:"C.S. Lewis"},
];

const h = new Date().getHours();
const g = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
document.getElementById('greeting').textContent = `${g}, Mrs. Williams 🌸`;

const qi = new Date().getDate() % Q.length;
document.getElementById('quote').textContent = `"${Q[qi].q}"`;
document.getElementById('quoteAttr').textContent = `— ${Q[qi].a}`;

const PK = 'williams_progress';
function gp() { const s = localStorage.getItem(PK); return s ? JSON.parse(s) : {}; }
function sp(p) { localStorage.setItem(PK, JSON.stringify(p)); }

function tog(n, ev) {
    ev.stopPropagation();
    const p = gp();
    p[n] ? delete p[n] : p[n] = 1;
    sp(p);
    render();
}

function toggleWeek(w) {
    const hdr = document.getElementById('wh'+w);
    const body = document.getElementById('wb'+w);
    hdr.classList.toggle('open');
    body.classList.toggle('open');
}

function render() {
    const p = gp();
    const done = Object.keys(p).length;
    document.getElementById('progText').textContent = `${done}/24`;
    document.getElementById('progFill').style.width = (done/24*100) + '%';
    
    const today = new Date().toISOString().slice(0,10);
    let next = S.find(s => !p[s.s] && s.dt >= today) || S.find(s => !p[s.s]) || null;
    
    function fmtDate(dt) {
        const d = new Date(dt + 'T12:00:00');
        const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        return `${days[d.getDay()]}, ${m[d.getMonth()]} ${d.getDate()}`;
    }
    
    if (next) {
        document.getElementById('nextTitle').textContent = `Session ${next.s}: ${next.t}`;
        document.getElementById('nextMeta').textContent = `${fmtDate(next.dt)} · ${next.tm} · ${next.u === 'geo' ? 'Geometry' : 'Algebra'}`;
        // Teaching bullets + props
        const tipData = TIPS[next.s];
        if (tipData) {
            let tipHtml = '<div style="font-size:0.72em;font-weight:800;color:#C06C84;text-transform:uppercase;letter-spacing:0.5px;margin-top:14px;">📌 Key Points</div>';
            tipHtml += '<ul style="margin:6px 0 14px;padding-left:18px;font-size:0.82em;color:#6B4460;line-height:1.7;">';
            tipData.teach.forEach(t => tipHtml += `<li style="margin-bottom:5px;">${t}</li>`);
            tipHtml += '</ul>';
            tipHtml += '<div style="font-size:0.72em;font-weight:800;color:#8B5E83;text-transform:uppercase;letter-spacing:0.5px;">🎒 Bring From Home</div>';
            tipHtml += '<ul style="margin:6px 0 6px;padding-left:18px;font-size:0.82em;color:#6B4460;line-height:1.7;">';
            tipData.props.forEach(p => tipHtml += `<li style="margin-bottom:5px;">${p}</li>`);
            tipHtml += '</ul>';
            document.getElementById('nextMeta').insertAdjacentHTML('afterend', tipHtml);
        }
        let btns = `<a class="next-btn primary" href="lesson-plans.html#session-${next.s}">📋 Lesson</a>`;
        if (next.ws) btns += `<a class="next-btn secondary" href="${next.ws}">📄 Worksheet</a>`;
        if (next.qz) btns += `<a class="next-btn secondary" href="${next.qz}">✏️ Quiz</a>`;
        if (next.ts) btns += `<a class="next-btn secondary" href="${next.ts}">📋 Test</a>`;
        document.getElementById('nextActions').innerHTML = btns;
        
        const vids = VIDS[next.s];
        if (vids && vids.length) {
            let vidHtml = '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
            vids.slice(0,2).forEach(v => {
                vidHtml += `<a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" style="text-decoration:none;display:block;width:135px;">
                    <div style="position:relative;border-radius:8px;overflow:hidden;background:#000;">
                        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" style="width:135px;height:76px;object-fit:cover;display:block;opacity:0.85;">
                        <span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;font-size:1.3em;text-shadow:0 0 8px rgba(0,0,0,0.5);">▶</span>
                    </div>
                    <div style="font-size:0.7em;color:#888;margin-top:3px;line-height:1.2;">${v.t}</div>
                </a>`;
            });
            vidHtml += '</div>';
            document.getElementById('nextVideos').innerHTML = vidHtml;
        }
    } else {
        document.getElementById('nextTitle').textContent = '🎉 All done!';
        document.getElementById('nextMeta').textContent = 'Every session complete';
        document.getElementById('nextActions').innerHTML = '';
    }
    
    const list = document.getElementById('weekList');
    list.innerHTML = '';
    
    for (let w = 1; w <= 8; w++) {
        const ws = S.filter(s => s.w === w);
        const wDone = ws.filter(s => p[s.s]).length;
        const allDone = wDone === ws.length;
        const unit = w <= 4 ? 'geo' : 'alg';
        const hasNext = next && next.w === w;
        
        const block = document.createElement('div');
        block.className = 'week';
        
        let progLabel = wDone > 0 ? (allDone ? '✓' : `${wDone}/${ws.length}`) : '';
        
        let body = '';
        ws.forEach(s => {
            const d = !!p[s.s];
            const isNext = next && next.s === s.s;
            let links = '';
            if (s.ws) links += `<a class="s-link ws" href="${s.ws}" title="Worksheet">📄</a>`;
            if (s.qz) links += `<a class="s-link qz" href="${s.qz}" title="Quiz">✏️</a>`;
            if (s.ts) links += `<a class="s-link ts" href="${s.ts}" title="Test">📋</a>`;
            
            body += `<div class="session${d?' done':''}${isNext?' next':''}" onclick="window.location.href='lesson-plans.html#session-${s.s}'" style="cursor:pointer;">
                <div class="s-check${d?' done':''}" onclick="tog(${s.s},event);event.stopPropagation();">${d?'✓':s.s}</div>
                <div class="s-info"><div class="s-title">${s.t}</div>
                <div class="s-sub">${fmtDate(s.dt)} · ${s.tm}</div></div>
                <div class="s-links" onclick="event.stopPropagation();">${links}</div></div>`;
        });
        
        block.innerHTML = `<div class="week-hdr${hasNext?' open':''}" id="wh${w}" onclick="toggleWeek(${w})">
            <div class="wnum${unit==='alg'?' alg':''}">${w}</div>
            <div class="wtitle">${WK[w].n} <span style="font-weight:400;font-size:0.85em;color:#baa;">· ${WK[w].r}</span></div>
            <div class="wprog">${progLabel}</div>
            <div class="warrow">▶</div>
        </div><div class="week-body${hasNext?' open':''}" id="wb${w}">${body}</div>`;
        
        list.appendChild(block);
    }
}

render();
</script>
<div id="teacherGate" style="display:none; position:fixed; inset:0; z-index:9999; background:linear-gradient(135deg,#8B5E83,#C06C84); display:flex; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:20px; padding:40px 30px; text-align:center; max-width:340px; width:90%; box-shadow:0 10px 40px rgba(0,0,0,0.2);">
        <div style="font-size:2.5em; margin-bottom:10px;">🌸</div>
        <h2 style="font-family:Playfair Display,serif; color:#8B5E83; margin-bottom:5px;">Teacher Portal</h2>
        <p style="color:#aaa; font-size:0.85em; margin-bottom:20px;">Enter password to continue</p>
        <input type="password" id="teacherPinInput" placeholder="Password"
            style="width:100%; padding:12px; border:2px solid #E8C4CF; border-radius:10px; font-size:1em; text-align:center; font-family:Nunito,sans-serif; outline:none;"
            onkeydown="if(event.key==='Enter')checkTeacherPin()">
        <button onclick="checkTeacherPin()" style="width:100%; margin-top:12px; padding:12px; background:linear-gradient(135deg,#8B5E83,#C06C84); color:white; border:none; border-radius:10px; font-size:1em; font-weight:700; font-family:Nunito,sans-serif; cursor:pointer;">Enter</button>
        <p id="teacherPinError" style="color:#B73A3A; font-size:0.85em; margin-top:10px; display:none;">Incorrect password</p>
    </div>
</div>
<script>
(function(){
    const TEACHER_KEY = 'williams_teacher_auth';
    const gate = document.getElementById('teacherGate');
    if (localStorage.getItem(TEACHER_KEY) === 'true') {
        gate.style.display = 'none';
    } else {
        gate.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        setTimeout(() => document.getElementById('teacherPinInput').focus(), 100);
    }
    window.checkTeacherPin = function() {
        const v = document.getElementById('teacherPinInput').value.toLowerCase().trim();
        if (v === 'gospel') {
            localStorage.setItem(TEACHER_KEY, 'true');
            gate.style.display = 'none';
            document.body.style.overflow = '';
        } else {
            document.getElementById('teacherPinError').style.display = 'block';
            document.getElementById('teacherPinInput').value = '';
            document.getElementById('teacherPinInput').focus();
        }
    };
})();
</script>
</body>
</html>
