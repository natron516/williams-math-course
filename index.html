<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrs. Williams' Math Class</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: #FAF5F7; color: #444; }
        
        .hero { background: linear-gradient(135deg, #8B5E83, #C06C84);
                color: white; padding: 30px 20px; text-align: center; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 1.8em; }
        .hero p { opacity: 0.85; margin-top: 4px; font-size: 0.95em; }
        
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        
        /* Greeting */
        .greeting { font-size: 1.05em; color: #8B5E83; font-weight: 700; margin-bottom: 20px; }
        
        /* Progress */
        .progress { background: white; border-radius: 14px; padding: 16px 20px; margin-bottom: 20px;
                   box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .progress-top { display: flex; justify-content: space-between; font-size: 0.85em;
                       color: #8B5E83; font-weight: 700; margin-bottom: 8px; }
        .progress-bar { background: #f0e0e6; border-radius: 20px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, #C06C84, #F67280);
                        transition: width 0.5s; width: 0%; }
        
        /* Up Next card */
        .next-card { background: white; border-radius: 14px; padding: 20px; margin-bottom: 20px;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-left: 4px solid #C06C84; }
        .next-label { font-size: 0.78em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
                     color: #C06C84; margin-bottom: 6px; }
        .next-title { font-family: 'Playfair Display', serif; font-size: 1.25em; color: #6B4460; }
        .next-meta { font-size: 0.85em; color: #aaa; margin: 4px 0 12px; }
        .next-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .next-btn { padding: 9px 18px; border-radius: 10px; font-size: 0.88em; font-weight: 700;
                   text-decoration: none; font-family: 'Nunito', sans-serif; transition: all 0.2s; }
        .next-btn.primary { background: #C06C84; color: white; }
        .next-btn.secondary { background: #FDE8EE; color: #8B5E83; }
        .next-btn:hover { transform: translateY(-1px); }
        
        /* Quick links */
        .quick { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
        .quick a { background: white; border-radius: 12px; padding: 16px 10px; text-align: center;
                  text-decoration: none; color: #6B4460; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                  transition: all 0.2s; font-weight: 700; font-size: 0.88em; }
        .quick a:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        .quick a span { display: block; font-size: 1.8em; margin-bottom: 4px; }
        
        /* Session list */
        .week-label { font-size: 0.82em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
                     color: #C06C84; margin: 20px 0 8px; padding-left: 4px; }
        .session { display: flex; align-items: center; gap: 12px; background: white; border-radius: 12px;
                  padding: 14px 16px; margin-bottom: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.03);
                  transition: all 0.2s; cursor: default; }
        .session:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .session.done { opacity: 0.45; }
        .session.done .s-title { text-decoration: line-through; }
        .session.next { border: 2px solid #C06C8444; background: #FFF5F7; }
        .s-check { width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid #dcc;
                  display: flex; align-items: center; justify-content: center; cursor: pointer;
                  font-size: 0.8em; font-weight: 800; color: #C06C84; flex-shrink: 0;
                  transition: all 0.2s; background: white; }
        .s-check:hover { background: #FDE8EE; border-color: #C06C84; transform: scale(1.1); }
        .s-check.done { background: #C06C84; border-color: #C06C84; color: white; }
        .s-info { flex: 1; min-width: 0; }
        .s-title { font-size: 0.95em; font-weight: 700; color: #444; }
        .s-sub { font-size: 0.78em; color: #aaa; margin-top: 1px; }
        .s-links { display: flex; gap: 6px; flex-shrink: 0; }
        .s-link { font-size: 0.75em; padding: 4px 10px; border-radius: 6px; text-decoration: none;
                 font-weight: 700; }
        .s-link.lp { background: #FDE8EE; color: #8B5E83; }
        .s-link.qz { background: #FFF3E0; color: #BF6B1A; }
        .s-link.ts { background: #FFEBEE; color: #B73A3A; }
        
        /* Student portal link */
        .student-link { display: block; background: white; border-radius: 12px; padding: 16px 20px;
                       margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                       text-decoration: none; color: #6B4460; transition: all 0.2s;
                       display: flex; align-items: center; justify-content: space-between; }
        .student-link:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        .student-link .arrow { color: #C06C84; font-size: 1.2em; }
        
        /* Footer */
        .footer { text-align: center; padding: 30px 20px; color: #cbb; font-size: 0.85em; }
        .footer .quote { font-family: 'Playfair Display', serif; font-size: 1em; color: #8B5E83;
                        font-style: italic; max-width: 450px; margin: 0 auto 4px; }
        .footer .attr { font-size: 0.8em; color: #baa; }
        .footer .heart { margin-top: 12px; }
        
        @media (max-width: 500px) { .quick { grid-template-columns: 1fr; } .s-links { display: none; } }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Mrs. Williams' Math Class</h1>
        <p>6th & 7th Grade · Geometry & Algebra</p>
    </div>
    
    <div class="container">
        <div class="greeting" id="greeting"></div>
        
        <div class="progress">
            <div class="progress-top">
                <span>Course Progress</span>
                <span id="progText">0 / 24</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
        </div>
        
        <div class="next-card" id="nextCard">
            <div class="next-label">Up Next</div>
            <div class="next-title" id="nextTitle"></div>
            <div class="next-meta" id="nextMeta"></div>
            <div class="next-actions" id="nextActions"></div>
        </div>
        
        <div class="quick">
            <a href="lesson-plans.html"><span>📋</span>Lesson Plans</a>
            <a href="gradebook.html"><span>📈</span>Grade Book</a>
            <a href="scope-sequence.html"><span>📊</span>Scope & Sequence</a>
        </div>
        
        <a class="student-link" href="student.html">
            <div><strong>🎓 Student Portal</strong><br><span style="font-size:0.82em;color:#aaa;">Share this link with your students</span></div>
            <span class="arrow">→</span>
        </a>
        
        <div id="sessionList"></div>
    </div>
    
    <div class="footer">
        <div class="quote" id="quote"></div>
        <div class="attr" id="quoteAttr"></div>
        <div class="heart">Made with 🌸 for Mrs. Williams' class</div>
    </div>

<script>
const S = [
{s:1,w:1,t:"Intro to Angles",d:"Mon",u:"geo",ws:"worksheets/W01_Angle_Explorer.html"},
{s:2,w:1,t:"Angle Relationships",d:"Wed",u:"geo",ws:"worksheets/W02_Angle_Relationships.html"},
{s:3,w:1,t:"Triangles & Polygons",d:"Fri",u:"geo",ws:"worksheets/W03_Shape_Detective.html",qz:"quizzes/Quiz_1_Angles_Shapes.html"},
{s:4,w:2,t:"Perimeter",d:"Mon",u:"geo",ws:"worksheets/W04_Perimeter_Pro.html"},
{s:5,w:2,t:"Area: Rectangles & Triangles",d:"Wed",u:"geo",ws:"worksheets/W05_Area_Architect.html"},
{s:6,w:2,t:"Area: Parallelograms & Trapezoids",d:"Fri",u:"geo",ws:"worksheets/W06_Shape_Shifter.html",qz:"quizzes/Quiz_2_Perimeter_Area.html"},
{s:7,w:3,t:"Circumference",d:"Mon",u:"geo",ws:"worksheets/W07_Going_in_Circles.html"},
{s:8,w:3,t:"Circle Area",d:"Wed",u:"geo",ws:"worksheets/W08_Area_of_the_Round.html"},
{s:9,w:3,t:"Composite Shapes",d:"Fri",u:"geo",ws:"worksheets/W09_Blueprint_Builder.html",qz:"quizzes/Quiz_3_Circles_Composite.html"},
{s:10,w:4,t:"Volume of Prisms",d:"Mon",u:"geo",ws:"worksheets/W10_Box_It_Up.html"},
{s:11,w:4,t:"Cylinders & Surface Area",d:"Wed",u:"geo",ws:"worksheets/W11_Container_Challenge.html"},
{s:12,w:4,t:"Geometry Test",d:"Fri",u:"geo",ts:"tests/Test_1_Geometry.html"},
{s:13,w:5,t:"Variables & Expressions",d:"Mon",u:"alg",ws:"worksheets/W13_Expression_Station.html"},
{s:14,w:5,t:"Combining Like Terms",d:"Wed",u:"alg",ws:"worksheets/W14_Like_Terms_Lineup.html"},
{s:15,w:5,t:"Order of Operations",d:"Fri",u:"alg",ws:"worksheets/W15_Order_Up.html",qz:"quizzes/Quiz_4_Expressions.html"},
{s:16,w:6,t:"One-Step Equations (+/−)",d:"Mon",u:"alg",ws:"worksheets/W16_Balance_It_Out.html"},
{s:17,w:6,t:"One-Step Equations (×/÷)",d:"Wed",u:"alg",ws:"worksheets/W17_Fair_and_Square.html"},
{s:18,w:6,t:"Mixed Equations",d:"Fri",u:"alg",ws:"worksheets/W18_Equation_Mix.html",qz:"quizzes/Quiz_5_One_Step_Equations.html"},
{s:19,w:7,t:"Two-Step Equations",d:"Mon",u:"alg",ws:"worksheets/W19_Two_Steps_to_Go.html"},
{s:20,w:7,t:"Inequalities",d:"Wed",u:"alg",ws:"worksheets/W20_More_or_Less.html"},
{s:21,w:7,t:"Review + Algebra Test",d:"Fri",u:"alg",qz:"quizzes/Quiz_6_TwoStep_Inequalities.html",ts:"tests/Test_2_Algebra.html"},
{s:22,w:8,t:"Coordinate Plane",d:"Mon",u:"alg",ws:"worksheets/W22_Plot_Twist.html"},
{s:23,w:8,t:"Linear Relationships",d:"Wed",u:"alg",ws:"worksheets/W23_Connect_the_Data.html",qz:"quizzes/Quiz_7_Coordinate_Linear.html"},
{s:24,w:8,t:"Final Test",d:"Fri",u:"alg",ts:"tests/Test_Final_Comprehensive.html"},
];

const WK = {1:"Angles & Shapes",2:"Perimeter & Area",3:"Circles",4:"Volume + Test 1",
            5:"Expressions",6:"Equations",7:"Inequalities + Test 2",8:"Graphing + Final"};

const Q = [
{q:"The essence of mathematics is not to make simple things complicated, but to make complicated things simple.",a:"John Taylor Gatto (paraphrased)"},
{q:"Genius is as common as dirt. We suppress genius because we haven't yet figured out how to manage a population of educated men and women.",a:"John Taylor Gatto"},
{q:"Whatever an education is, it should make you a unique individual, not a conformist.",a:"John Taylor Gatto"},
{q:"School is a twelve-year jail sentence where bad habits are the only curriculum truly learned.",a:"John Taylor Gatto"},
{q:"I've come to believe that genius is an exceedingly common human quality, probably natural to most of us.",a:"John Taylor Gatto"},
{q:"Teaching is not about information. It is about having an honest intellectual relationship with your students.",a:"John Taylor Gatto"},
{q:"Schooling is not education. Education happens when teachers shut up and students do the work.",a:"John Taylor Gatto"},
{q:"Trust the children. Nothing could be more simple, or more difficult.",a:"John Holt"},
{q:"Learning is not the product of teaching. Learning is the product of the activity of learners.",a:"John Holt"},
{q:"No use to shout at them to pay attention. If the situations before the child do not interest him, his attention will slip off to what does interest him.",a:"John Holt"},
{q:"We need not fear that children left to themselves will remain ignorant.",a:"John Holt"},
{q:"The prosperity of a country depends not on the abundance of its revenues, but on the number of its cultivated citizens.",a:"Martin Luther"},
{q:"Even if I knew that tomorrow the world would go to pieces, I would still plant my apple tree.",a:"Martin Luther"},
{q:"If you want to change the world, pick up your pen and write.",a:"Martin Luther"},
{q:"I have never let my schooling interfere with my education.",a:"Mark Twain"},
{q:"The only really educated men are self-educated.",a:"Mark Twain"},
{q:"The task of the modern educator is not to cut down jungles, but to irrigate deserts.",a:"C.S. Lewis"},
{q:"Education without values, as useful as it is, seems rather to make man a more clever devil.",a:"C.S. Lewis"},
{q:"Courage is not simply one of the virtues, but the form of every virtue at the testing point.",a:"C.S. Lewis"},
];

// Greeting
const h = new Date().getHours();
const g = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
const e = h < 12 ? "☀️" : h < 17 ? "🌤️" : "☕";
document.getElementById('greeting').textContent = `${g}, Mrs. Williams ${e}`;

// Quote
const qi = new Date().getDate() % Q.length;
document.getElementById('quote').textContent = `"${Q[qi].q}"`;
document.getElementById('quoteAttr').textContent = `— ${Q[qi].a}`;

// Progress
const PK = 'williams_progress';
function gp() { const s = localStorage.getItem(PK); return s ? JSON.parse(s) : {}; }
function sp(p) { localStorage.setItem(PK, JSON.stringify(p)); }

function tog(n) {
    const p = gp();
    p[n] ? delete p[n] : p[n] = 1;
    sp(p);
    render();
}

function render() {
    const p = gp();
    const done = Object.keys(p).length;
    document.getElementById('progText').textContent = `${done} / 24`;
    document.getElementById('progFill').style.width = (done/24*100) + '%';
    
    // Find next
    let next = S.find(s => !p[s.s]) || null;
    
    // Next card
    if (next) {
        document.getElementById('nextTitle').textContent = `Session ${next.s}: ${next.t}`;
        document.getElementById('nextMeta').textContent = `Week ${next.w} · ${next.d === 'Mon' ? 'Monday' : next.d === 'Wed' ? 'Wednesday' : 'Friday'} · ${next.u === 'geo' ? 'Geometry' : 'Algebra'}`;
        let btns = `<a class="next-btn primary" href="lesson-plans.html">📋 Lesson Plan</a>`;
        if (next.ws) btns += `<a class="next-btn secondary" href="${next.ws}">📄 Worksheet</a>`;
        if (next.ts) btns += `<a class="next-btn secondary" href="${next.ts}">🔴 Test</a>`;
        if (next.qz) btns += `<a class="next-btn secondary" href="${next.qz}">📝 Quiz</a>`;
        document.getElementById('nextActions').innerHTML = btns;
    } else {
        document.getElementById('nextTitle').textContent = '🎉 All done!';
        document.getElementById('nextMeta').textContent = 'Every session complete';
        document.getElementById('nextActions').innerHTML = '';
    }
    
    // Sessions
    const list = document.getElementById('sessionList');
    list.innerHTML = '';
    let cw = 0;
    S.forEach(s => {
        if (s.w !== cw) {
            cw = s.w;
            const lbl = document.createElement('div');
            lbl.className = 'week-label';
            lbl.textContent = `Week ${s.w} — ${WK[s.w]}`;
            list.appendChild(lbl);
        }
        const d = !!p[s.s];
        const isNext = next && next.s === s.s;
        const row = document.createElement('div');
        row.className = 'session' + (d ? ' done' : '') + (isNext ? ' next' : '');
        
        let links = '';
        if (s.ws) links += `<a class="s-link lp" href="${s.ws}">📄</a>`;
        if (s.qz) links += `<a class="s-link qz" href="${s.qz}">📝</a>`;
        if (s.ts) links += `<a class="s-link ts" href="${s.ts}">🔴</a>`;
        
        row.innerHTML = `
            <div class="s-check ${d?'done':''}" onclick="tog(${s.s})">${d ? '✓' : s.s}</div>
            <div class="s-info">
                <div class="s-title">${s.t}</div>
                <div class="s-sub">${s.d === 'Mon' ? 'Monday' : s.d === 'Wed' ? 'Wednesday' : 'Friday'} · ${s.u === 'geo' ? '📐 Geometry' : '📊 Algebra'}</div>
            </div>
            <div class="s-links">${links}</div>`;
        list.appendChild(row);
    });
}

render();
</script>
</body>
</html>
