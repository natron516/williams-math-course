const nav = document.getElementById('sessionNav');
const container = document.getElementById('lessonContainer');

lessons.forEach((l, i) => {
    // Nav button
    const btn = document.createElement('div');
    btn.className = `session-btn ${l.u}`;
    btn.textContent = l.s;
    btn.onclick = () => showLesson(i);
    nav.appendChild(btn);

    // Lesson content
    const div = document.createElement('div');
    div.className = 'lesson';
    div.innerHTML = `
        <div class="lesson-title">${l.t}</div>
        <div class="lesson-meta">Session ${l.s} · Week ${l.w} · ${l.d} · ${l.u === 'geo' ? '📐 Geometry' : '📊 Algebra'}</div>
        <div class="lesson-section"><h3>⏱️ Time Breakdown</h3><div class="time-bar">${l.time.split('|').map(t => `<span class="time-block">${t.trim()}</span>`).join('')}</div></div>
        <div class="lesson-section"><h3>🎯 Objectives</h3><div class="content">${l.obj}</div></div>
        <div class="lesson-section"><h3>📦 Materials</h3><div class="content">${l.mat}</div></div>
        <div class="lesson-section"><h3>🔥 Warm-Up</h3><div class="content">${l.warm}</div></div>
        ${renderVideos(l.s)}
        <div class="lesson-section"><h3>📖 Direct Instruction</h3><div class="content">${l.direct}</div></div>
        <div class="lesson-section"><h3>👥 Guided Practice</h3><div class="content">${l.guided}</div></div>
        <div class="lesson-section"><h3>✏️ Independent Work</h3><div class="content">${l.indep}</div></div>
        <div class="lesson-section"><h3>🏁 Closing</h3><div class="content">${l.closing}</div></div>
        <div class="lesson-section"><h3>📚 Homework</h3><div class="content">${l.hw}</div></div>
        <div class="lesson-section"><h3>🔀 Differentiation</h3>
            <div class="diff-box">
                <div class="diff-item struggling"><div class="diff-label">⬇️ Struggling</div>${l.diff_s}</div>
                <div class="diff-item advanced"><div class="diff-label">⬆️ Advanced</div>${l.diff_a}</div>
            </div>
        </div>`;
    container.appendChild(div);
});

function showLesson(idx) {
    document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.lesson').forEach(l => l.classList.remove('active'));
    nav.children[idx].classList.add('active');
    container.children[idx].classList.add('active');
}
showLesson(0);
