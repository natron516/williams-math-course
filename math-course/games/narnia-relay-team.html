<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narnia Relay — Team</title>
<style>
  :root{
    --gold:#c9a227;--dark:#1a1a2e;--card:#0f3460;--accent:#e94560;
    --green:#2ecc71;--text:#f0e6d3;--muted:#a0968a;--tc:#c9a227;
    --t0:#e74c3c;--t1:#3498db;--t2:#2ecc71;--t3:#f39c12;--t4:#9b59b6;--t5:#1abc9c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Georgia',serif;background:var(--dark);color:var(--text);min-height:100vh;}

  /* Header */
  .hdr{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1rem;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.1);flex-wrap:wrap;gap:.4rem;}
  .team-title{font-size:1.3rem;font-weight:bold;color:var(--tc);}
  .my-score{font-size:1.8rem;font-weight:bold;font-family:monospace;color:var(--tc);}
  .timer{font-size:1.3rem;font-family:monospace;color:var(--gold);}
  .timer.urgent{color:var(--accent);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* Mini leaderboard */
  .lb{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;padding:.5rem .8rem;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.07);}
  .lb-item{background:rgba(255,255,255,.04);border-radius:7px;padding:.3rem .5rem;font-size:.75rem;display:flex;justify-content:space-between;border:1px solid transparent;}
  .lb-item.me{border-color:var(--tc);}
  .lb-name{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%;}
  .lb-pts{font-weight:bold;font-family:monospace;}

  /* Main */
  .main{padding:1rem;}

  /* Waiting state */
  .waiting{text-align:center;padding:3rem 1rem;color:var(--muted);}
  .waiting h2{color:var(--gold);font-size:1.4rem;margin-bottom:.8rem;}
  .waiting p{font-style:italic;}
  .spin{font-size:2rem;animation:spin 2s linear infinite;display:inline-block;margin-bottom:.8rem;}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  /* Question card */
  .q-card{background:var(--card);border-radius:14px;padding:1.4rem;border-left:4px solid var(--tc);margin-bottom:1rem;line-height:1.75;font-size:1.05rem;}
  .q-meta{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem;}
  .q-hint{color:var(--muted);font-size:.82rem;margin-top:.7rem;display:block;}

  /* Answer */
  .ans-row{display:flex;gap:.6rem;margin-bottom:.5rem;flex-wrap:wrap;}
  .ans-input{flex:1;min-width:140px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);border-radius:10px;padding:.7rem 1rem;color:var(--text);font-size:1.15rem;font-family:inherit;transition:border-color .2s;}
  .ans-input:focus{outline:none;border-color:var(--tc);}
  .ans-input:disabled{opacity:.5;}
  .sub-btn{padding:.7rem 1.4rem;border-radius:10px;border:none;background:var(--tc);color:#1a1a1a;font-size:1rem;font-weight:bold;font-family:inherit;cursor:pointer;transition:opacity .2s;}
  .sub-btn:disabled{opacity:.4;cursor:not-allowed;}
  .feedback{font-size:.95rem;min-height:1.4em;padding:.2rem 0;}
  .feedback.ok{color:var(--green);}
  .feedback.bad{color:var(--accent);}

  /* Score flash */
  .score-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3rem;font-weight:bold;color:var(--green);pointer-events:none;opacity:0;transition:opacity .3s;}
  .score-flash.show{opacity:1;}

  /* Win */
  #win{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:2rem;}
  #win.show{display:flex;}
  .win-icon{font-size:4.5rem;margin-bottom:1rem;}
  .win-h1{font-size:2rem;color:var(--gold);margin-bottom:.4rem;}
  .win-sub{color:var(--muted);font-style:italic;margin-bottom:1.8rem;}
  .final-tbl{max-width:360px;width:100%;border-collapse:collapse;}
  .final-tbl td{padding:.55rem .8rem;font-size:1rem;}

  /* Error / loading */
  .centered{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:2rem;color:var(--muted);}
  .centered h2{color:var(--gold);margin-bottom:.8rem;}
</style>
</head>
<body>

<div id="loading" class="centered"><h2>🦁 Joining game…</h2></div>

<div id="app" style="display:none">
  <div class="hdr">
    <div class="team-title" id="team-title">Team</div>
    <div class="timer" id="timer">--:--</div>
    <div class="my-score" id="my-score">0 pts</div>
  </div>
  <div class="lb" id="lb"></div>
  <div class="main" id="main">
    <div class="waiting" id="waiting">
      <div class="spin">⚔️</div>
      <h2>Get Ready!</h2>
      <p>Waiting for your teacher to push the first question…</p>
    </div>
    <div id="q-area" style="display:none">
      <div class="q-card">
        <div class="q-meta" id="q-meta">Question 1 · 10 pts</div>
        <div id="q-text"></div>
        <span class="q-hint" id="q-hint"></span>
      </div>
      <div class="ans-row">
        <input class="ans-input" id="ans" placeholder="Type your answer…">
        <button class="sub-btn" id="sub-btn" onclick="submitAnswer()">Submit ✓</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>
</div>

<div id="win">
  <div class="win-icon">🏆</div>
  <div class="win-h1" id="win-h1">Game Over!</div>
  <div class="win-sub" id="win-sub">"Further up and further in!" — C.S. Lewis</div>
  <table class="final-tbl" id="final-tbl"></table>
</div>

<div class="score-flash" id="flash"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
let QUESTIONS = []; // loaded from Firebase
const _PLACEHOLDER = [
  {q:"🦁 <b>Mr. Tumnus's Parcels</b><br>Mr. Tumnus was carrying 14 parcels. He dropped 6 and could only go back for 3. How many did he arrive home with?",a:["11"],pts:10,hint:"14 − 6 + 3"},
  {q:"🔢 <b>Multiplication Review</b><br>A classroom has 6 rows of desks with 8 desks in each row. How many desks total?",a:["48"],pts:10,hint:"6 × 8"},
  {q:"🎅 <b>Father Christmas's Gifts</b><br>Father Christmas visited 9 villages and left 6 packages at each. How many packages total?",a:["54"],pts:10,hint:"9 × 6"},
  {q:"🔢 <b>Fraction Review</b><br>There are 20 students. ¾ remembered homework. How many remembered?",a:["15"],pts:10,hint:"20 × 3 ÷ 4"},
  {q:"🐟 <b>The Beaver's Barrels</b><br>72 trout divided equally among 9 barrels. How many per barrel?",a:["8"],pts:10,hint:"72 ÷ 9"},
  {q:"📐 <b>Perimeter Review</b><br>A rectangle is 15 feet long and 10 feet wide. What is its perimeter?",a:["50","50 feet","50ft"],pts:10,hint:"P = 2 × (15 + 10)"},
  {q:"🏰 <b>Cair Paravel Courtyard</b><br>King Peter's courtyard: 40 ft long, 25 ft wide. How many feet of stone wall surrounds it?",a:["130","130 feet","130ft"],pts:10,hint:"P = 2 × (40 + 25)"},
  {q:"💯 <b>Percentage Review</b><br>80 items on sale. 25% are sold out. How many are sold out?",a:["20"],pts:10,hint:"80 ÷ 4"},
  {q:"💰 <b>Edmund's Gold Coins</b><br>King Edmund had 200 gold coins and gave 15% to the Talking Animals. How many did he give away?",a:["30"],pts:10,hint:"200 × 0.15"},
  {q:"📏 <b>Area Review</b><br>A square garden has sides of 9 feet. What is its area?",a:["81","81 sq ft","81 square feet"],pts:10,hint:"9 × 9"},
  {q:"🌸 <b>Aslan's Royal Garden</b><br>A perfect square with each side 12 feet. What is the area?",a:["144","144 sq ft","144 square feet"],pts:10,hint:"12 × 12"},
  {q:"📏 <b>Unit Conversion</b><br>A bookshelf is 3 feet tall. How many inches? (1 ft = 12 in)",a:["36","36 inches"],pts:10,hint:"3 × 12"},
  {q:"⚔️ <b>Reepicheep's Sword</b><br>Reepicheep is 9 inches tall. His sword is 1 foot long. How many inches longer is the sword than him?",a:["3","3 inches"],pts:10,hint:"12 − 9"},
  {q:"🔢 <b>Multi-Step Problem</b><br>5 boxes of pencils. Each box: 4 packs. Each pack: 12 pencils. Total pencils?",a:["240"],pts:10,hint:"5 × 4 × 12"},
  {q:"🍰 <b>Mr. Tumnus's Cakes</b><br>Mr. Tumnus baked 24 cakes and set out ¾ for Lucy. How many did he set out?",a:["18"],pts:10,hint:"24 × 3 ÷ 4"},
  {q:"⏰ <b>Time Review</b><br>A movie starts at 2:15 PM and runs 1 hour 45 minutes. What time does it end?",a:["4:00","4:00 pm","4 pm","4:00 PM"],pts:10,hint:"2:15 + 1:45"},
  {q:"🐭 <b>The Mice at the Stone Table</b><br>12 mice each chewed through 3 cords. How many cord-chews total?",a:["36"],pts:10,hint:"12 × 3"},
  {q:"🔢 <b>Division Review</b><br>46 students split into groups of 5. How many complete groups, and how many left over?",a:["9 groups, 1 left over","9 groups 1 left over","9r1","9 remainder 1"],pts:10,hint:"46 ÷ 5"},
  {q:"🍬 <b>BONUS ⭐ — Edmund's Turkish Delight</b><br>Room 1: 9 shelves × 12 boxes. Room 2: 6 shelves × 15 boxes. Room 3: 4 shelves × 18 boxes. Each box has 8 pieces. Total pieces?",a:["1488"],pts:15,hint:"(9×12 + 6×15 + 4×18) × 8 = 270 × 8"},
  {q:"placeholder",a:[""],pts:10,hint:""}
]; // replaced from Firebase

const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
const MEDALS = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];

firebase.initializeApp({
  apiKey:"AIzaSyA5qnahNEDXEo4CvDZi7PIqcKGfga0Oqn4",
  authDomain:"mrswilliamsmath-1d6de.firebaseapp.com",
  projectId:"mrswilliamsmath-1d6de",
  storageBucket:"mrswilliamsmath-1d6de.firebasestorage.app",
  messagingSenderId:"370339384366",
  appId:"1:370339384366:web:e2e5abfd8263b84db223bf"
});
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const gameId = params.get('game');
const teamIdx = parseInt(params.get('team') || '0');
const teamKey = 'team' + teamIdx;
const myColor = COLORS[teamIdx] || '#c9a227';

document.documentElement.style.setProperty('--tc', myColor);

let gameData = null;
let myScore = 0;
let myAnswered = [];
let currentQ = -1;
let timerRemaining = 0;
let timerInterval = null;
let started = false;
let lastQIdx = -1; // track when question changes so we reset input

if (!gameId) {
  document.getElementById('loading').innerHTML = '<h2>⚠️ No game link</h2><p>Ask your teacher for your team link.</p>';
} else {
  db.collection('relay_games').doc(gameId).onSnapshot(function(snap) {
    if (!snap.exists) {
      document.getElementById('loading').innerHTML = '<h2>⚠️ Game not found</h2>';
      return;
    }
    gameData = snap.data();

    if (!started && gameData.startedAt) {
      // Load questions from Firebase so all iPads use the same shuffled set
      if (gameData.questions && gameData.questions.length > 0) {
        QUESTIONS = gameData.questions;
      }
      const elapsed = Math.floor((Date.now() - gameData.startedAt.toMillis()) / 1000);
      timerRemaining = Math.max(0, gameData.timerSeconds - elapsed);
      startTimer();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      // Set team name
      const myTeam = gameData.teams[teamKey];
      document.getElementById('team-title').textContent = myTeam ? myTeam.name : 'Team '+(teamIdx+1);
      started = true;
    }

    // Update my data
    const myTeam = gameData.teams[teamKey];
    if (myTeam) {
      myScore = myTeam.score || 0;
      myAnswered = myTeam.answered || [];
    }

    updateMyScore();
    updateLeaderboard();

    // Handle question change
    const newQ = gameData.currentQ;
    if (typeof newQ === 'number' && newQ !== lastQIdx) {
      lastQIdx = newQ;
      showQuestion(newQ);
    }

    // Game ended
    if (gameData.status === 'ended') {
      clearInterval(timerInterval);
      showWin();
    }
  });
}

function updateMyScore() {
  document.getElementById('my-score').textContent = myScore + ' pts';
}

function updateLeaderboard() {
  if (!gameData) return;
  const teams = gameData.teams;
  const sorted = Object.keys(teams).map(function(k) {
    return {key:k, idx:parseInt(k.replace('team','')), name:teams[k].name, score:teams[k].score||0};
  }).sort(function(a,b){ return b.score-a.score; });

  document.getElementById('lb').innerHTML = sorted.map(function(t,r) {
    const isMe = t.key===teamKey;
    const medal = r===0?'🥇':r===1?'🥈':r===2?'🥉':(r+1)+'.';
    return '<div class="lb-item'+(isMe?' me':'')+'">' +
      '<span class="lb-name" style="color:'+COLORS[t.idx]+'">'+medal+' '+t.name+'</span>' +
      '<span class="lb-pts" style="color:'+COLORS[t.idx]+'">'+t.score+'</span>' +
      '</div>';
  }).join('');
}

function showQuestion(idx) {
  const q = QUESTIONS[idx];
  if (!q) return;
  currentQ = idx;

  document.getElementById('waiting').style.display = 'none';
  document.getElementById('q-area').style.display = 'block';

  document.getElementById('q-meta').textContent = 'Question '+(idx+1)+(idx>=18?' — BONUS ⭐':'')+' · '+q.pts+' pts';
  document.getElementById('q-text').innerHTML = q.q;
  document.getElementById('q-hint').textContent = '💡 ' + q.hint;

  const alreadyAnswered = myAnswered.indexOf(idx) !== -1;
  const ans = document.getElementById('ans');
  const btn = document.getElementById('sub-btn');
  const fb = document.getElementById('feedback');

  ans.value = '';
  ans.disabled = alreadyAnswered;
  btn.disabled = alreadyAnswered;

  if (alreadyAnswered) {
    fb.textContent = '✅ You already got this one!';
    fb.className = 'feedback ok';
  } else {
    fb.textContent = '';
    fb.className = 'feedback';
    setTimeout(function(){ ans.focus(); }, 100);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitAnswer();
});

async function submitAnswer() {
  const ans = document.getElementById('ans');
  const fb = document.getElementById('feedback');
  const btn = document.getElementById('sub-btn');
  const raw = ans.value.trim();
  if (!raw || btn.disabled || currentQ < 0) return;

  const q = QUESTIONS[currentQ];
  const correct = q.a.some(function(a) {
    return a.toLowerCase() === raw.toLowerCase() ||
           a.toLowerCase().replace(/[^0-9.]/g,'') === raw.toLowerCase().replace(/[^0-9.]/g,'');
  });

  // Write answer attempt to Firebase so teacher can see it
  await db.collection('relay_games').doc(gameId).update({
    ['answers.' + teamKey]: {qIdx: currentQ, value: raw, correct: correct}
  });

  if (correct) {
    ans.disabled = true;
    btn.disabled = true;

    // Use a transaction to check if we're the first correct answer (bonus +2)
    const gameDocRef = db.collection('relay_games').doc(gameId);
    let finalPts = q.pts;

    await db.runTransaction(async function(tx) {
      const snap = await tx.get(gameDocRef);
      const data = snap.data() || {};
      const teams = data.teams || {};

      // Check if any other team already answered this question correctly
      const alreadyAnswered = Object.keys(teams).some(function(k) {
        return k !== teamKey && (teams[k].answered || []).includes(currentQ);
      });

      finalPts = q.pts + (alreadyAnswered ? 0 : 2);
      const newAnswered = myAnswered.concat([currentQ]);
      const newScore = (teams[teamKey] ? (teams[teamKey].score || 0) : myScore) + finalPts;

      tx.update(gameDocRef, {
        [teamKey + '.answered']: newAnswered,
        [teamKey + '.score']: newScore,
        ['teams.' + teamKey + '.answered']: newAnswered,
        ['teams.' + teamKey + '.score']: newScore
      });
    });

    const bonusMsg = finalPts > q.pts ? ' ⚡ +2 first answer bonus!' : '';
    fb.textContent = '✅ Correct! +' + finalPts + ' pts' + bonusMsg;
    fb.className = 'feedback ok';
    playCorrect();
    showFlash('+' + finalPts);
  } else {
    fb.textContent = '❌ Try again!';
    fb.className = 'feedback bad';
    playWrong();
    ans.select();
    setTimeout(function() {
      if (fb.textContent === '❌ Try again!') {
        fb.textContent = '';
        fb.className = 'feedback';
      }
    }, 2000);
  }
}

// ── SOUNDS (Web Audio API) ────────────────────────────────────────
var _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playCorrect() {
  try {
    var ctx = getAudioCtx();
    // Triumphant fanfare: G - B - D - G (rising arpeggio)
    var notes = [392, 494, 587, 784];
    var times = [0, 0.12, 0.24, 0.38];
    var durations = [0.15, 0.15, 0.15, 0.45];
    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      var t = ctx.currentTime + times[i];
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + durations[i]);
      osc.start(t);
      osc.stop(t + durations[i]);
    });
    // Final sparkle shimmer
    var shimmer = ctx.createOscillator();
    var shimGain = ctx.createGain();
    shimmer.connect(shimGain);
    shimGain.connect(ctx.destination);
    shimmer.type = 'sine';
    shimmer.frequency.setValueAtTime(1200, ctx.currentTime + 0.5);
    shimmer.frequency.linearRampToValueAtTime(1600, ctx.currentTime + 0.75);
    shimGain.gain.setValueAtTime(0.15, ctx.currentTime + 0.5);
    shimGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    shimmer.start(ctx.currentTime + 0.5);
    shimmer.stop(ctx.currentTime + 0.85);
  } catch(e) {}
}

function playWrong() {
  try {
    var ctx = getAudioCtx();
    // Low descending bleat
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(140, ctx.currentTime + 0.35);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.45);
  } catch(e) {}
}

function playWin() {
  try {
    var ctx = getAudioCtx();
    // Full victory fanfare: C-E-G-C-E-G-C (two octaves)
    var notes = [262, 330, 392, 523, 659, 784, 1047];
    var times = [0, 0.1, 0.2, 0.35, 0.45, 0.55, 0.7];
    var durs =  [0.15,0.15,0.15,0.18,0.18,0.18,0.7];
    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = i < 3 ? 'triangle' : 'sine';
      osc.frequency.value = freq;
      var t = ctx.currentTime + times[i];
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + durs[i]);
      osc.start(t);
      osc.stop(t + durs[i]);
    });
  } catch(e) {}
}

function showFlash(msg) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 1200);
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(function(){
    timerRemaining--;
    updateTimerDisplay();
    if(timerRemaining<=0){ clearInterval(timerInterval); }
  },1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining/60);
  const s = timerRemaining%60;
  const el = document.getElementById('timer');
  el.textContent = m+':'+(s<10?'0':'')+s;
  el.classList.toggle('urgent', timerRemaining<=60);
}

function showWin() {
  if (!gameData) return;
  playWin();
  const win = document.getElementById('win');
  win.classList.add('show');
  const teams = gameData.teams;
  const sorted = Object.keys(teams).map(function(k){
    return {key:k,idx:parseInt(k.replace('team','')),name:teams[k].name,score:teams[k].score||0};
  }).sort(function(a,b){return b.score-a.score;});

  document.getElementById('win-h1').textContent = '🏆 ' + sorted[0].name + ' Wins!';
  document.getElementById('final-tbl').innerHTML = sorted.map(function(t,i){
    const isMe = t.key===teamKey;
    return '<tr style="color:'+COLORS[t.idx]+(isMe?';font-weight:bold':'')+'">' +
      '<td>'+MEDALS[i]+' '+t.name+(isMe?' ← you':'')+' </td>' +
      '<td style="text-align:right">'+t.score+' pts</td></tr>';
  }).join('');
}
</script>
</body>
</html>
