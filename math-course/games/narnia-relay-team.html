<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narnia Math Relay — Team</title>
<style>
  :root {
    --gold: #c9a227;
    --dark: #1a1a2e;
    --card: #0f3460;
    --accent: #e94560;
    --green: #2ecc71;
    --text: #f0e6d3;
    --muted: #a0968a;
    --team1: #e74c3c; --team2: #3498db; --team3: #2ecc71;
    --team4: #f39c12; --team5: #9b59b6; --team6: #1abc9c;
    --tc: var(--gold);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1rem;
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .team-name-display { font-size: 1.3rem; font-weight: bold; color: var(--tc); }
  .team-score-display { font-size: 2rem; font-weight: bold; font-family: monospace; color: var(--tc); }
  .timer-display { font-size: 1.4rem; font-family: monospace; color: var(--gold); }
  .timer-display.urgent { color: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── LIVE LEADERBOARD ── */
  .leaderboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.4rem;
    padding: 0.6rem 0.8rem;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .lb-item {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid transparent;
  }
  .lb-item.is-me { border-color: var(--tc); background: rgba(255,255,255,0.1); }
  .lb-item.leading { }
  .lb-name { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
  .lb-score { font-weight: bold; font-family: monospace; }

  /* ── MAIN CONTENT ── */
  .main { padding: 1rem; }

  /* Progress bar */
  .progress-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
  .progress-track { flex: 1; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; background: var(--tc); transition: width 0.4s; }
  .progress-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

  /* Question nav pills */
  .q-nav { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .q-pill {
    padding: 0.3rem 0.6rem;
    border-radius: 20px;
    font-size: 0.75rem;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    transition: all 0.15s;
    user-select: none;
  }
  .q-pill.active { background: var(--tc); color: #1a1a1a; border-color: var(--tc); font-weight: bold; }
  .q-pill.done { background: rgba(46,204,113,0.2); border-color: var(--green); color: var(--green); }

  /* Question card */
  .q-card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.2rem;
    border-left: 4px solid var(--tc);
    margin-bottom: 1rem;
    line-height: 1.7;
    font-size: 1rem;
  }
  .q-badge {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }
  .hint-text { color: var(--muted); font-size: 0.82rem; margin-top: 0.6rem; display: block; }

  /* Answer area */
  .answer-area {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .ans-input {
    flex: 1;
    min-width: 140px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-size: 1.1rem;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .ans-input:focus { outline: none; border-color: var(--tc); }
  .ans-input:disabled { opacity: 0.5; }
  .submit-btn {
    padding: 0.7rem 1.5rem;
    border-radius: 10px;
    border: none;
    background: var(--tc);
    color: #1a1a1a;
    font-size: 1rem;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .ans-feedback {
    font-size: 0.9rem;
    min-height: 1.4em;
    padding: 0.3rem 0;
  }
  .ans-feedback.correct { color: var(--green); }
  .ans-feedback.wrong { color: var(--accent); }
  .ans-feedback.done { color: var(--green); }

  /* Toast */
  #toast {
    position: fixed; top: 1rem; right: 1rem;
    background: #0f3460;
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 0.7rem 1.1rem;
    font-size: 0.9rem;
    opacity: 0; transform: translateY(-8px);
    transition: all 0.3s;
    z-index: 999;
    max-width: 260px;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* Loading / error */
  .centered {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; text-align: center; padding: 2rem;
    color: var(--muted);
  }
  .centered h2 { color: var(--gold); margin-bottom: 1rem; }

  /* Win banner */
  #win-banner {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center; justify-content: center; flex-direction: column;
    text-align: center; padding: 2rem;
  }
  #win-banner.show { display: flex; }
  .win-trophy { font-size: 5rem; margin-bottom: 1rem; }
  .win-h1 { font-size: 2rem; color: var(--gold); margin-bottom: 0.5rem; }
  .win-sub { color: var(--muted); font-style: italic; margin-bottom: 2rem; }
  .final-table { width: 100%; max-width: 380px; border-collapse: collapse; }
  .final-table td { padding: 0.6rem 0.8rem; font-size: 1rem; }
  .final-table tr:first-child td { color: var(--gold); font-weight: bold; font-size: 1.2rem; }
</style>
</head>
<body>

<div id="loading" class="centered"><h2>🦁 Joining game…</h2><p>Loading questions…</p></div>

<div id="app" style="display:none">
  <div class="header">
    <div class="team-name-display" id="team-name">Team</div>
    <div class="timer-display" id="timer-display">--:--</div>
    <div class="team-score-display" id="my-score">0 pts</div>
  </div>

  <div class="leaderboard" id="leaderboard"></div>

  <div class="main">
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0 / 20 done</div>
    </div>

    <div class="q-nav" id="q-nav"></div>

    <div class="q-card" id="q-card">
      <div class="q-badge" id="q-badge">Question 1</div>
      <div id="q-text"></div>
      <span class="hint-text" id="q-hint"></span>
    </div>

    <div class="answer-area">
      <input class="ans-input" id="ans-input" placeholder="Type your answer…" />
      <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">Submit ✓</button>
    </div>
    <div class="ans-feedback" id="ans-feedback"></div>
  </div>
</div>

<div id="win-banner">
  <div class="win-trophy">🏆</div>
  <div class="win-h1" id="win-h1">Game Over!</div>
  <div class="win-sub" id="win-sub">"Further up and further in!" — C.S. Lewis</div>
  <table class="final-table" id="final-table"></table>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ── QUESTIONS ──────────────────────────────────────────────────────
const QUESTIONS = [
  { q: "🦁 <b>Mr. Tumnus's Parcels</b><br>Mr. Tumnus was carrying 14 parcels. He dropped 6 and could only go back for 3. How many parcels did he arrive home with?", a: ["11"], pts: 10, hint: "14 − 6 + 3" },
  { q: "🔢 <b>Multiplication Review</b><br>A classroom has 6 rows of desks with 8 desks in each row. How many desks are there in all?", a: ["48"], pts: 10, hint: "6 × 8" },
  { q: "🎅 <b>Father Christmas's Gifts</b><br>Father Christmas visited 9 villages and left exactly 6 packages at each village. How many packages did he leave in all?", a: ["54"], pts: 10, hint: "9 × 6" },
  { q: "🔢 <b>Fraction Review</b><br>There are 20 students in a class. ¾ of them remembered their homework. How many students remembered?", a: ["15"], pts: 10, hint: "20 × ¾ = 20 × 3 ÷ 4" },
  { q: "🐟 <b>The Beaver's Barrels</b><br>The Beavers brought 72 trout to the castle kitchen. The cook divided them equally among 9 barrels. How many trout in each barrel?", a: ["8"], pts: 10, hint: "72 ÷ 9" },
  { q: "📐 <b>Perimeter Review</b><br>A rectangle is 15 feet long and 10 feet wide. What is its perimeter?", a: ["50","50 feet","50ft"], pts: 10, hint: "P = 2 × (l + w)" },
  { q: "🏰 <b>Cair Paravel Courtyard</b><br>King Peter's courtyard was 40 feet long and 25 feet wide. How many feet of stone wall would surround it completely?", a: ["130","130 feet","130ft"], pts: 10, hint: "P = 2 × (40 + 25)" },
  { q: "💯 <b>Percentage Review</b><br>A store has 80 items on sale. 25% are sold out. How many items are sold out?", a: ["20"], pts: 10, hint: "80 × 0.25 or 80 ÷ 4" },
  { q: "💰 <b>Edmund's Gold Coins</b><br>King Edmund had 200 gold coins and gave 15% to the Talking Animals. How many coins did he give away?", a: ["30"], pts: 10, hint: "200 × 0.15" },
  { q: "📏 <b>Area Review</b><br>A square garden has sides of 9 feet each. What is its area in square feet?", a: ["81","81 sq ft","81 square feet"], pts: 10, hint: "A = side × side" },
  { q: "🌸 <b>Aslan's Royal Garden</b><br>The Pevensies' royal garden was a perfect square with each side 12 feet. What is the area in square feet?", a: ["144","144 sq ft","144 square feet"], pts: 10, hint: "A = 12 × 12" },
  { q: "📏 <b>Unit Conversion</b><br>A bookshelf is 3 feet tall. How many inches tall is it? (1 foot = 12 inches)", a: ["36","36 inches"], pts: 10, hint: "3 × 12" },
  { q: "⚔️ <b>Reepicheep's Sword</b><br>Reepicheep stood 9 inches tall. His sword was exactly 1 foot long. How many inches longer was his sword than his own height?", a: ["3","3 inches"], pts: 10, hint: "1 foot = 12 inches; 12 − 9 = ?" },
  { q: "🔢 <b>Multi-Step Problem</b><br>A school ordered 5 boxes of pencils. Each box has 4 packs, and each pack has 12 pencils. How many pencils in all?", a: ["240"], pts: 10, hint: "5 × 4 × 12" },
  { q: "🍰 <b>Mr. Tumnus's Cakes</b><br>Mr. Tumnus baked 24 cakes and set out ¾ for Lucy. How many cakes did he set out for Lucy?", a: ["18"], pts: 10, hint: "24 × ¾ = 24 × 3 ÷ 4" },
  { q: "⏰ <b>Time Review</b><br>A movie starts at 2:15 PM and runs for 1 hour 45 minutes. What time does it end?", a: ["4:00","4:00 pm","4 pm","4:00 PM"], pts: 10, hint: "2:15 + 1:45 = ?" },
  { q: "🐭 <b>The Mice at the Stone Table</b><br>12 mice each chewed through 3 cords. How many cord-chews did all the mice make in total?", a: ["36"], pts: 10, hint: "12 × 3" },
  { q: "🔢 <b>Division Review</b><br>46 students are split equally into groups of 5. How many complete groups are there, and how many students are left over?", a: ["9 groups, 1 left over","9 groups 1 left over","9 groups with 1 left","9r1","9 remainder 1"], pts: 10, hint: "46 ÷ 5 = ? r ?" },
  { q: "🍬 <b>BONUS — Edmund's Turkish Delight</b><br>Room 1: 9 shelves × 12 boxes. Room 2: 6 shelves × 15 boxes. Room 3: 4 shelves × 18 boxes. Each box has 8 pieces. How many total pieces of Turkish Delight?", a: ["1488"], pts: 15, hint: "(9×12 + 6×15 + 4×18) × 8 = 270×8" },
  { q: "🐉 <b>BONUS — Eustace's Dragon Hoard</b><br>8 gold rings @ 15 coins, 6 goblets @ 24 coins, 12 bags @ 30 coins, 4 necklaces @ 55 coins, 9 swords @ 20 coins. Grand total?", a: ["1258","1,258"], pts: 15, hint: "(8×15)+(6×24)+(12×30)+(4×55)+(9×20)" }
];

const TEAM_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
const TEAM_COLORS_CSS = ['var(--team1)','var(--team2)','var(--team3)','var(--team4)','var(--team5)','var(--team6)'];

// ── INIT ───────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyA5qnahNEDXEo4CvDZi7PIqcKGfga0Oqn4",
  authDomain: "mrswilliamsmath-1d6de.firebaseapp.com",
  projectId: "mrswilliamsmath-1d6de",
  storageBucket: "mrswilliamsmath-1d6de.firebasestorage.app",
  messagingSenderId: "370339384366",
  appId: "1:370339384366:web:e2e5abfd8263b84db223bf"
});
const db = firebase.firestore();

// ── URL PARAMS ─────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const gameId = params.get('game');
const teamIdx = parseInt(params.get('team') || '0');
const teamKey = `team${teamIdx}`;
const myColor = TEAM_COLORS[teamIdx] || '#c9a227';
const myColorCSS = TEAM_COLORS_CSS[teamIdx] || 'var(--gold)';

// Set team color CSS variable
document.documentElement.style.setProperty('--tc', myColorCSS);

// ── STATE ──────────────────────────────────────────────────────────
let gameData = null;
let myAnswered = [];   // indices of correctly answered questions
let myScore = 0;
let currentQ = 0;
let timerInterval = null;
let timerRemaining = 0;
let gameStartTime = null;
let gameStatus = 'active';

// ── LOAD GAME ──────────────────────────────────────────────────────
if (!gameId) {
  document.getElementById('loading').innerHTML = '<h2>⚠️ No game found</h2><p>Ask your teacher for the correct link.</p>';
} else {
  const gameRef = db.collection('relay_games').doc(gameId);

  // Real-time listener
  gameRef.onSnapshot(snap => {
    if (!snap.exists) {
      document.getElementById('loading').innerHTML = '<h2>⚠️ Game not found</h2><p>Check your link.</p>';
      return;
    }
    gameData = snap.data();
    gameStatus = gameData.status || 'active';

    if (gameStatus === 'ended') {
      showWinScreen();
      return;
    }

    // First load
    if (!timerInterval && gameData.startedAt) {
      const elapsed = Math.floor((Date.now() - gameData.startedAt.toMillis()) / 1000);
      timerRemaining = Math.max(0, gameData.timerSeconds - elapsed);
      startTimer();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      initUI();
    }

    // Restore my data
    const myTeam = gameData.teams[teamKey];
    if (myTeam) {
      myAnswered = myTeam.answered || [];
      myScore = myTeam.score || 0;
    }

    updateLeaderboard();
    updateMyScore();
    updateQNav();
    updateProgress();
    // refresh current question state (in case we just answered)
    refreshCurrentQ();
  });
}

function initUI() {
  const myTeam = gameData.teams[teamKey];
  document.getElementById('team-name').textContent = myTeam?.name || `Team ${teamIdx+1}`;
  buildQNav();
  showQ(0);
  document.getElementById('ans-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAnswer();
  });
}

// ── TIMER ──────────────────────────────────────────────────────────
function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      showWinScreen();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  const el = document.getElementById('timer-display');
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  el.classList.toggle('urgent', timerRemaining <= 60);
}

// ── LEADERBOARD ────────────────────────────────────────────────────
function updateLeaderboard() {
  if (!gameData) return;
  const teams = gameData.teams;
  const sorted = Object.entries(teams)
    .map(([key, t]) => ({ key, name: t.name, score: t.score || 0 }))
    .sort((a, b) => b.score - a.score);

  const lb = document.getElementById('leaderboard');
  lb.innerHTML = sorted.map((t, rank) => {
    const idx = parseInt(t.key.replace('team',''));
    const isMe = t.key === teamKey;
    const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : `${rank+1}.`;
    return `
      <div class="lb-item ${isMe?'is-me':''}">
        <span class="lb-name" style="color:${TEAM_COLORS[idx]}">${medal} ${t.name}</span>
        <span class="lb-score" style="color:${TEAM_COLORS[idx]}">${t.score}</span>
      </div>
    `;
  }).join('');
}

// ── MY SCORE ───────────────────────────────────────────────────────
function updateMyScore() {
  document.getElementById('my-score').textContent = `${myScore} pts`;
}

// ── PROGRESS ───────────────────────────────────────────────────────
function updateProgress() {
  const pct = (myAnswered.length / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${myAnswered.length} / ${QUESTIONS.length} done`;
}

// ── Q NAV ──────────────────────────────────────────────────────────
function buildQNav() {
  const nav = document.getElementById('q-nav');
  nav.innerHTML = QUESTIONS.map((q, i) => `
    <span class="q-pill" id="qpill-${i}" onclick="showQ(${i})">Q${i+1}${i>=18?'⭐':''}</span>
  `).join('');
}

function updateQNav() {
  QUESTIONS.forEach((_, i) => {
    const pill = document.getElementById(`qpill-${i}`);
    if (!pill) return;
    pill.classList.remove('active','done');
    if (myAnswered.includes(i)) pill.classList.add('done');
    if (i === currentQ) pill.classList.add('active');
  });
}

// ── SHOW QUESTION ──────────────────────────────────────────────────
function showQ(idx) {
  currentQ = idx;
  const q = QUESTIONS[idx];
  document.getElementById('q-badge').textContent = `Question ${idx+1}${idx>=18?' — BONUS ⭐':''}  •  ${q.pts} pts`;
  document.getElementById('q-text').innerHTML = q.q;
  document.getElementById('q-hint').textContent = `💡 Hint: ${q.hint}`;

  const answered = myAnswered.includes(idx);
  const inp = document.getElementById('ans-input');
  const btn = document.getElementById('submit-btn');
  const fb = document.getElementById('ans-feedback');

  inp.value = '';
  inp.disabled = answered;
  btn.disabled = answered;

  if (answered) {
    fb.textContent = '✅ Correct! Already answered.';
    fb.className = 'ans-feedback done';
  } else {
    fb.textContent = '';
    fb.className = 'ans-feedback';
    inp.focus();
  }

  updateQNav();
}

function refreshCurrentQ() {
  // Called on snapshot update — re-check if the current question is now answered
  const answered = myAnswered.includes(currentQ);
  const inp = document.getElementById('ans-input');
  const btn = document.getElementById('submit-btn');
  const fb = document.getElementById('ans-feedback');
  if (answered && !inp.disabled) {
    inp.disabled = true;
    btn.disabled = true;
    fb.textContent = '✅ Correct! Already answered.';
    fb.className = 'ans-feedback done';
  }
}

// ── SUBMIT ANSWER ──────────────────────────────────────────────────
async function submitAnswer() {
  const inp = document.getElementById('ans-input');
  const fb = document.getElementById('ans-feedback');
  const btn = document.getElementById('submit-btn');
  const raw = inp.value.trim();
  if (!raw || btn.disabled) return;

  const q = QUESTIONS[currentQ];
  const correct = q.a.some(ans =>
    ans.toLowerCase() === raw.toLowerCase() ||
    ans.toLowerCase().replace(/[^0-9.]/g,'') === raw.toLowerCase().replace(/[^0-9.]/g,'')
  );

  if (correct) {
    const pts = q.pts;
    btn.disabled = true;
    inp.disabled = true;
    fb.textContent = `✅ Correct! +${pts} pts`;
    fb.className = 'ans-feedback correct';

    // Update Firebase
    const newAnswered = [...myAnswered, currentQ];
    const newScore = myScore + pts;
    await db.collection('relay_games').doc(gameId).update({
      [`teams.${teamKey}.answered`]: newAnswered,
      [`teams.${teamKey}.score`]: newScore
    });

    toast(`🎉 +${pts} pts!`);

    // Auto-advance to next unanswered question
    const next = QUESTIONS.findIndex((_, i) => i > currentQ && !newAnswered.includes(i));
    if (next !== -1) {
      setTimeout(() => showQ(next), 800);
    }
  } else {
    fb.textContent = '❌ Try again!';
    fb.className = 'ans-feedback wrong';
    inp.select();
    setTimeout(() => {
      if (fb.textContent === '❌ Try again!') {
        fb.textContent = '';
        fb.className = 'ans-feedback';
      }
    }, 2000);
  }
}

// ── WIN SCREEN ─────────────────────────────────────────────────────
function showWinScreen() {
  clearInterval(timerInterval);
  if (!gameData) return;
  const banner = document.getElementById('win-banner');
  banner.classList.add('show');

  const teams = gameData.teams;
  const sorted = Object.entries(teams)
    .map(([key, t]) => ({ key, name: t.name, score: t.score || 0 }))
    .sort((a, b) => b.score - a.score);

  const winner = sorted[0];
  const isWinner = winner.key === teamKey;
  document.getElementById('win-h1').textContent = isWinner ? `🏆 ${winner.name} Wins!` : `🏆 ${winner.name} Wins!`;

  const quotes = [
    '"Further up and further in!" — C.S. Lewis',
    '"Courage, dear heart." — C.S. Lewis',
    '"In our world too, a stable once had something inside it that was bigger than our whole world." — C.S. Lewis'
  ];
  document.getElementById('win-sub').textContent = quotes[Math.floor(Math.random()*quotes.length)];

  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
  document.getElementById('final-table').innerHTML = sorted.map((t,i) => {
    const idx = parseInt(t.key.replace('team',''));
    const isMe = t.key === teamKey;
    return `<tr style="color:${TEAM_COLORS[idx]}${isMe?'; font-weight:bold':''}">
      <td>${medals[i]} ${t.name}${isMe?' ← you':''}</td>
      <td style="text-align:right">${t.score} pts</td>
    </tr>`;
  }).join('');
}

// ── TOAST ──────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
